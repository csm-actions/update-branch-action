---
name: wc-create-pr-branch
run-name: wc-create-pr-branch (${{inputs.pr}})
on:
  workflow_call:
    inputs:
      version:
        type: string
        description: version
        required: true
      pr:
        description: "Pull Request Number"
        required: false
        type: string
      is_comment:
        description: If the comment is posted
        required: false
        default: false
        type: boolean

jobs:
  create-pr-branch:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - if: inputs.pr != ''
        run: gh pr checkout "$PR"
        env:
          GITHUB_TOKEN: ${{github.token}}
          PR: ${{inputs.pr}}

      - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.57.2
        env:
          GITHUB_TOKEN: ${{github.token}}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache-dependency-path: package-lock.json
          cache: npm
      - run: npm ci

      - run: npm run build

      - uses: suzuki-shunsuke/release-js-action@70e628b312540c8e706e31708977542719cf8302 # v0.2.0
        with:
          version: ${{inputs.version}}
          is_comment: ${{inputs.is_comment}}
